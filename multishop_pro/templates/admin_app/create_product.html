{% extends "admin_app/master.html" %}
{% block content %} 
{% load static %}
<!-- partial -->
<div class="main-panel">
  <div class="content-wrapper">
    <div class="content-wrapper d-flex align-items-center auth">
      <div class="row flex-grow">
        <div class="col-lg-13 mx-auto">
          <div class="auth-form-light text-left p-5">
            <h4>Add Product</h4>
            <h6 class="font-weight-light">Create new Product</h6>

            <form class="pt-3" method="POST" enctype="multipart/form-data">
              {% csrf_token %}
              <div class="row mb-3">
                  <label class="col-sm-2 col-form-label">Category</label>
                  <div class="col-sm-10">
                    <select class="form-select" name ="cate_one" aria-label="Default select example">
                      <option selected>Open this select menu</option>
                      {% for i in cat_main1 %}
                      <option value="{{ i.id }}">{{ i.category_name1 }}</option>
                      {% endfor %}
                    </select>
                  </div>
                </div>
                <div class="row mb-3">
                  <label class="col-sm-2 col-form-label">Sub Category</label>
                  <div class="col-sm-10">
                    <select class="form-select" name ="cate_two" aria-label="Default select example">
                      <option selected>Open this select menu</option>
                      {% for i in cat_main2 %}
                      <option value="{{ i.id }}">{{ i.category_name2 }}</option>
                      {% endfor %}
                    </select>
                  </div>
                </div>
                <div class="row mb-3">
                  <label class="col-sm-2 col-form-label">option category</label>
                  <div class="col-sm-10">
                    <select class="form-select" name ="cate_three" aria-label="Default select example">
                      <option selected>Open this select menu</option>
                      {% for i in cat_main3 %}
                      <option value="{{ i.id }}">{{ i.category_name3 }}</option>
                      {% endfor %}
                    </select>
                  </div>
                </div>
              <div class="form-group">
                <label class="form-label">Product Name</label>
                <input
                  type="text"
                  name="product_name"
                  class="form-control form-control-lg"
                  placeholder="Enter Product Name"
                />
              </div>

              <div class="form-group">
                <label class="form-label">Product Image</label>
                <input
                  type="file"
                  name="product_image"
                  class="form-control form-control-lg"
                />
              </div> 

              <div class="form-group">
                <label class="form-label">Product Price</label>
                <input
                  type="number"
                  name="product_price"
                  class="form-control form-control-lg"
                  placeholder="Enter Product Price"/>
              </div>
              <div class="form-group">
                <label class="form-label">Discount Price</label>
                <input
                  type="number"
                  name="descount_price"
                  class="form-control form-control-lg"
                  placeholder="Enter Product Price"/>
              </div>

              <div class="form-group mt-3">
                <label class="form-label">Product Description</label>

                <textarea
                  name="product_despcrition"
                  class="form-control"
                  rows="5"
                  placeholder="Enter Description"
                ></textarea>
              </div>

              <div class="form-group">
                <label class="form-label">Product Brand</label>
                <input
                  type="text"
                  name="brand"
                  class="form-control form-control-lg"
                  placeholder="Enter Brand Name"
                />
              </div>

              <div class="form-group">
                <label class="form-label">Product Stock</label>
                <input
                  type="number"
                  name="stock"
                  class="form-control form-control-lg"
                  placeholder="Enter Stock Quantity"
                />
              </div>

              <div class="mt-4 d-grid gap-2">
                <button type="submit" class="btn btn-block btn-gradient-primary btn-lg font-weight-medium auth-form-btn">SAVE PRODUCT</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock content %}
