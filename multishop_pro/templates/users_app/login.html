{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Multishop</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>

        body{
            background:#f5f5f5;
            font-family:Arial, Helvetica, sans-serif;
        }

        .login-section{
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:40px 0;
        }
        .container{
            display:flex;
            align-items:center;
            justify-content:center;
        }
        .login-card{
            width:100%;
            max-width:950px;
            background:#fff;
            border-radius:20px;
            overflow:hidden;
            box-shadow:0px 5px 25px rgba(0,0,0,0.1);
        }

        .left-side{
            background:#FFD333;
            padding:60px 40px;
            height:100%;
            display:flex;
            flex-direction:column;
            justify-content:center;
            color:#000;
        }

        .left-side h1{
            font-size:45px;
            font-weight:bold;
            margin-bottom:20px;
        }

        .left-side p{
            font-size:17px;
            line-height:30px;
        }

        .right-side{
            padding:60px 40px;
        }

        .login-title{
            font-size:35px;
            font-weight:bold;
            color:#3D464D;
        }

        .login-subtitle{
            color:#777;
            margin-bottom:30px;
        }

        .form-label{
            font-weight:600;
            color:#3D464D;
        }

        .form-control,
        .form-select{
            height:50px;
            border-radius:10px;
            border:1px solid #ddd;
        }

        .form-control:focus,
        .form-select:focus{
            box-shadow:none;
            border-color:#FFD333;
        }

        .login-btn{
            background:#FFD333;
            border:none;
            color:#000;
            font-weight:bold;
            height:50px;
            border-radius:10px;
            transition:0.3s;
        }

        .login-btn:hover{
            background:#3D464D;
            color:#fff;
        }

        .register-link{
            color:#FFD333;
            text-decoration:none;
            font-weight:bold;
        }

        .register-link:hover{
            color:#3D464D;
        }

        .icon-box{
            width:80px;
            height:80px;
            border-radius:50%;
            background:#fff;
            display:flex;
            align-items:center;
            justify-content:center;
            margin-bottom:25px;
        }

        .icon-box i{
            font-size:35px;
            color:#FFD333;
        }

        @media(max-width:768px){

            .left-side{
                text-align:center;
                padding:40px 20px;
            }

            .right-side{
                padding:40px 20px;
            }

            .left-side h1{
                font-size:35px;
            }
        }

    </style>

</head>
<body>

<section class="login-section">

    <div class="container">

        <div class="login-card">

            <div class="row g-0">

                <!-- Left Side -->
                <div class="col-lg-5">

                    <div class="left-side">

                        <div class="icon-box">
                            <i class="fa-solid fa-cart-shopping"></i>
                        </div>

                        <h1>Multishop</h1>

                        <p>
                            Welcome back! Login as Admin or User and continue your shopping experience.
                        </p>

                    </div>

                </div>

                <!-- Right Side -->
                <div class="col-lg-7">

                    <div class="right-side">

                        <h2 class="login-title">
                            Login Account
                        </h2>

                        <p class="login-subtitle">
                            Enter your details to login.
                        </p>

                        <form method="POST">

                            {% csrf_token %}

                            <div class="mb-3">

                                <label class="form-label">
                                    Username
                                </label>

                                <input type="email"
                                       name="email"
                                       class="form-control"
                                       placeholder="Enter Username">

                            </div>

                            <div class="mb-4">

                                <label class="form-label">
                                    Password
                                </label>

                                <input type="password"
                                       name="password"
                                       class="form-control"
                                       placeholder="Enter Password">

                            </div>

                            <button type="submit"
                                    class="btn login-btn w-100">

                                LOGIN NOW

                            </button>

                            <div class="text-center mt-4">

                                Don't have an account ?

                                <a href="{% url "registration_view" %}" class="register-link">
                                    Register
                                </a><br>
                                home page
                                <a href="{% url "index_view" %}" class="register-link">
                                    Back
                                </a>

                            </div>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

</section>

</body>
</html>
