<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful | MultiShop</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #ffd333;
            --primary-dark: #e0b822;
            --dark: #3d464d;
            --success: #2d9e58;
            --success-light: #eefdf4;
            --border-color: #e5e9f0;
            --shadow-premium: 0 25px 60px rgba(0, 0, 0, 0.08);
            --gradient-premium: linear-gradient(135deg, #2d9e58 0%, #1e5c32 100%);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #f8fafc;
            color: var(--dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .success-card {
            background: white;
            border-radius: 28px;
            box-shadow: var(--shadow-premium);
            width: 100%;
            max-width: 550px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            text-align: center;
            animation: bounceIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .success-header {
            background: var(--gradient-premium);
            padding: 50px 30px;
            color: white;
            position: relative;
        }

        .success-header::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.1) 0%, transparent 80%);
        }

        .success-icon-wrapper {
            width: 90px;
            height: 90px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 10px 25px rgba(45, 158, 88, 0.3);
            position: relative;
            z-index: 2;
            animation: pulseSuccess 2.5s infinite;
        }

        .success-icon-wrapper i {
            color: var(--success);
            font-size: 3rem;
        }

        .success-header h2 {
            font-size: 1.8rem;
            font-weight: 800;
            margin: 0;
            letter-spacing: -0.02em;
        }

        .success-header p {
            margin: 8px 0 0;
            font-size: 0.95rem;
            opacity: 0.85;
        }

        .success-body {
            padding: 40px;
        }

        .invoice-card {
            background: #f8fafc;
            border: 1px solid var(--border-color);
            border-radius: 18px;
            padding: 25px;
            margin-bottom: 35px;
            text-align: left;
        }

        .invoice-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px dashed var(--border-color);
            font-size: 0.92rem;
        }
        .invoice-row:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }
        .invoice-row:first-child {
            padding-top: 0;
        }

        .invoice-label {
            color: #64748b;
            font-weight: 500;
        }

        .invoice-value {
            color: var(--dark);
            font-weight: 600;
        }

        .invoice-value.amount {
            font-size: 1.25rem;
            color: var(--success);
            font-weight: 800;
        }

        .btn-action-group {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn-continue {
            background: var(--dark);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.98rem;
            transition: all 0.25s ease;
            text-decoration: none;
            flex: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-continue:hover {
            background: #23272b;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        .btn-print {
            background: white;
            color: var(--dark);
            border: 1px solid var(--border-color);
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.98rem;
            transition: all 0.25s ease;
            text-decoration: none;
            flex: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-print:hover {
            background: var(--light);
            color: var(--dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }

        @keyframes bounceIn {
            0% {
                opacity: 0;
                transform: scale(0.3);
            }
            50% {
                opacity: 0.9;
                transform: scale(1.05);
            }
            70% {
                transform: scale(0.9);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes pulseSuccess {
            0% {
                box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.4);
            }
            70% {
                box-shadow: 0 0 0 15px rgba(255, 255, 255, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(255, 255, 255, 0);
            }
        }
    </style>
</head>
<body>

    <div class="success-card">
        
        <!-- Header -->
        <div class="success-header">
            <div class="success-icon-wrapper">
                <i class="fas fa-check"></i>
            </div>
            <h2>Order Placed Successfully!</h2>
            <p>Your payment has been processed securely.</p>
        </div>

        <!-- Body -->
        <div class="success-body">
            
            <div class="invoice-card">
                <div class="invoice-row">
                    <span class="invoice-label">Payment Gateway</span>
                    <span class="invoice-value">Razorpay (Test Mode)</span>
                </div>
                <div class="invoice-row">
                    <span class="invoice-label">Razorpay Order ID</span>
                    <span class="invoice-value" style="font-family: monospace;">{{ order_id }}</span>
                </div>
                <div class="invoice-row">
                    <span class="invoice-label">Transaction ID</span>
                    <span class="invoice-value" style="font-family: monospace;">{{ payment_id }}</span>
                </div>
                <div class="invoice-row">
                    <span class="invoice-label">Payment Status</span>
                    <span class="invoice-value text-success">
                        <i class="fas fa-check-circle me-1"></i> Success
                    </span>
                </div>
                <div class="invoice-row">
                    <span class="invoice-label">Amount Paid</span>
                    <span class="invoice-value amount">₹{{ amount }}</span>
                </div>
            </div>

            <!-- Action buttons -->
            <div class="btn-action-group">
                <a href="javascript:window.print();" class="btn-print">
                    <i class="fas fa-print"></i> Print Receipt
                </a>
                <a href="{% url 'shop_view' %}" class="btn-continue">
                    <i class="fas fa-shopping-bag"></i> Continue Shopping
                </a>
            </div>

        </div>

    </div>

</body>
</html>
