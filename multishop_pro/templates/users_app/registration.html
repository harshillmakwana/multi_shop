{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Multishop</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>

        body{
            background:#f5f5f5;
            font-family: Arial, Helvetica, sans-serif;
        }

        .register-section{
            min-height:100vh;
            width:100%;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:40px 0;
        }
        .container{
            display:flex;
            align-items:center;
            justify-content:center;
        }
        .register-card{
            width:100%;
            max-width:1000px;
            background:#fff;
            border-radius:15px;
            overflow:hidden;
            box-shadow:0px 5px 25px rgba(0,0,0,0.1);
        }

        .left-side{
            background:#FFD333;
            color:#000;
            padding:60px 40px;
            height:100%;
            display:flex;
            flex-direction:column;
            justify-content:center;
        }

        .left-side h1{
            font-size:45px;
            font-weight:bold;
            margin-bottom:20px;
        }

        .left-side p{
            font-size:17px;
            line-height:30px;
        }

        .right-side{
            padding:50px 40px;
        }

        .register-title{
            font-size:32px;
            font-weight:bold;
            margin-bottom:10px;
            color:#3D464D;
        }

        .register-subtitle{
            color:#777;
            margin-bottom:35px;
        }

        .form-label{
            font-weight:600;
            color:#3D464D;
        }

        .form-control{
            height:50px;
            border-radius:10px;
            border:1px solid #ddd;
        }

        .form-control:focus{
            box-shadow:none;
            border-color:#FFD333;
        }

        .register-btn{
            background:#FFD333;
            color:#000;
            font-weight:bold;
            border:none;
            height:50px;
            border-radius:10px;
            transition:0.3s;
        }

        .register-btn:hover{
            background:#3D464D;
            color:#fff;
        }

        .login-link{
            color:#FFD333;
            text-decoration:none;
            font-weight:bold;
        }

        .login-link:hover{
            color:#3D464D;
        }

        .icon-box{
            width:70px;
            height:70px;
            background:#fff;
            border-radius:50%;
            display:flex;
            align-items:center;
            justify-content:center;
            margin-bottom:25px;
        }

        .icon-box i{
            font-size:30px;
            color:#FFD333;
        }

        @media(max-width:768px){

            .left-side{
                text-align:center;
                padding:40px 20px;
            }

            .right-side{
                padding:40px 20px;
            }

            .left-side h1{
                font-size:35px;
            }
        }

    </style>
</head>
<body>

<section class="register-section">

    <div class="container">

        <div class="register-card">

            <div class="row g-0">

                <!-- Left Side -->
                <div class="col-lg-5">

                    <div class="left-side">

                        <div class="icon-box">
                            <i class="fa-solid fa-user-plus"></i>
                        </div>

                        <h1>Multishop</h1>

                        <p>
                            Create your account and start shopping with amazing offers,
                            discounts and premium quality products.
                        </p>

                    </div>

                </div>

                <!-- Right Side -->
                <div class="col-lg-7">

                    <div class="right-side">

                        <h2 class="register-title">
                            Create Account
                        </h2>

                        <p class="register-subtitle">
                            Fill all details carefully.
                        </p>

                        <form method="POST" enctype="multipart/form-data">

                            {% csrf_token %}
                            <div class="mb-3">

                                <label class="form-label">
                                    Login Type
                                </label>

                                <select name="role" class="form-select">
                                    <option value="user">User Login</option>
                                    <option value="admin">Admin Login</option>
                                </select>

                            </div>
                            <div class="row">

                                <div class="col-md-6 mb-3">
                                    <label class="form-label">First Name</label>
                                    <input type="text"
                                           name="first_name"
                                           class="form-control"
                                           placeholder="Enter First Name">
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Last Name</label>
                                    <input type="text"
                                           name="last_name"
                                           class="form-control"
                                           placeholder="Enter Last Name">
                                </div>

                            </div>

                            <div class="mb-3">
                                <label class="form-label">Username</label>
                                <input type="text"
                                       name="username"
                                       class="form-control"
                                       placeholder="Enter Username">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Email Address</label>
                                <input type="email"
                                       name="email"
                                       class="form-control"
                                       placeholder="Enter Email Address">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Mobile Number</label>
                                <input type="text"
                                       name="phone_number"
                                       class="form-control"
                                       placeholder="Enter Mobile Number">
                            </div>

                            

                            <div class="row">

                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Password</label>
                                    <input type="password"
                                           name="password"
                                           class="form-control"
                                           placeholder="Enter Password">
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Confirm Password</label>
                                    <input type="password"
                                           name="password1"
                                           class="form-control"
                                           placeholder="Confirm Password">
                                </div>

                            </div>

                            <div class="form-check mb-4">

                                <input class="form-check-input"
                                       type="checkbox"
                                       id="check">

                                <label class="form-check-label" for="check">
                                    I agree to Terms & Conditions
                                </label>

                            </div>

                            <button type="submit"
                                    class="btn register-btn w-100">

                                CREATE ACCOUNT

                            </button>

                            <div class="text-center mt-4">

                                Already have an account ?

                                <a href="{% url "login_view" %}" class="login-link">
                                    Login
                                </a>

                            </div>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>

</section>

</body>
</html>
